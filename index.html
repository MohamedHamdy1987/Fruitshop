<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام محل الخضار والفواكه</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== ألوان الهوية الجديدة ===== */
    :root {
      --primary-cream: #FDF8F2;
      --secondary-gold: #C9A96E;
      --accent-brown: #8B5E3C;
      --text-dark: #3E2E21;
      --text-soft: #6B4F32;
      --border-light: #EADCC8;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--primary-cream);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 32px;
      box-shadow: var(--shadow-md);
      padding: 40px 32px;
      border: 1px solid var(--border-light);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .auth-header p {
      font-size: 16px;
      color: var(--text-soft);
      font-weight: 500;
    }

    .auth-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--border-light);
      padding-bottom: 16px;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-weight: 700;
      font-size: 18px;
      color: var(--text-soft);
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.2s ease;
      background: transparent;
      border: none;
      font-family: 'Cairo', sans-serif;
    }

    .auth-tab.active {
      color: var(--accent-brown);
      background: rgba(139, 94, 60, 0.08);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-dark);
    }

    .form-group input {
      padding: 16px 18px;
      border: 1.5px solid var(--border-light);
      border-radius: 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      background: white;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--secondary-gold);
    }

    .form-group input::placeholder {
      color: #B8A68A;
      font-weight: 400;
    }

    .btn-primary {
      background: var(--accent-brown);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 18px;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
    }

    .btn-primary:hover {
      background: #6F4A2E;
    }

    .error-message {
      color: #D32F2F;
      font-size: 14px;
      margin-top: 8px;
      text-align: center;
      min-height: 24px;
    }

    .success-message {
      color: #2E7D32;
      font-size: 14px;
      margin-top: 8px;
      text-align: center;
    }

    .brand-note {
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .brand-note span {
      background: var(--secondary-gold);
      color: white;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-container {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-header">
    <h1>نظام محل الخضار والفواكه</h1>
    <p>إدارة متكاملة لمحلك التجاري</p>
  </div>

  <!-- تبويبات -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin">تسجيل الدخول</button>
    <button class="auth-tab" id="tabSignup">حساب جديد</button>
  </div>

  <!-- نموذج تسجيل الدخول -->
  <form id="loginForm" class="auth-form">
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="example@domain.com" required>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="loginPassword" placeholder="********" required>
    </div>
    <button type="submit" class="btn-primary">دخول</button>
    <div id="loginError" class="error-message"></div>
  </form>

  <!-- نموذج إنشاء حساب (مخفي افتراضيًا) -->
  <form id="signupForm" class="auth-form hidden">
    <div class="form-group">
      <label>اسم المحل</label>
      <input type="text" id="signupShopName" placeholder="محل الحاج حمدي السنوسي وأولاده" required>
    </div>
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="signupEmail" placeholder="example@domain.com" required>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="signupPassword" placeholder="********" required>
    </div>
    <div class="form-group">
      <label>تأكيد كلمة المرور</label>
      <input type="password" id="signupConfirmPassword" placeholder="********" required>
    </div>
    <button type="submit" class="btn-primary">إنشاء حساب</button>
    <div id="signupError" class="error-message"></div>
    <div id="signupSuccess" class="success-message"></div>
  </form>

  <div class="brand-note">
    <span>✓</span> محفوظ على السحابة
  </div>
</div>

<script type="module">
  import { signUp, signIn } from './auth.js';

  // DOM elements
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const loginError = document.getElementById('loginError');
  const signupError = document.getElementById('signupError');
  const signupSuccess = document.getElementById('signupSuccess');

  // Toggle tabs
  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active');
    tabSignup.classList.remove('active');
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    clearMessages();
  });

  tabSignup.addEventListener('click', () => {
    tabSignup.classList.add('active');
    tabLogin.classList.remove('active');
    signupForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
    clearMessages();
  });

  function clearMessages() {
    loginError.textContent = '';
    signupError.textContent = '';
    signupSuccess.textContent = '';
  }

  // Login handler
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!email || !password) {
      loginError.textContent = 'جميع الحقول مطلوبة';
      return;
    }

    const result = await signIn(email, password);
    if (result.success) {
      window.location.href = 'app.html';
    } else {
      loginError.textContent = result.error || 'بيانات الدخول غير صحيحة';
    }
  });

  // Signup handler
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const shopName = document.getElementById('signupShopName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const confirm = document.getElementById('signupConfirmPassword').value.trim();

    if (!shopName || !email || !password || !confirm) {
      signupError.textContent = 'جميع الحقول مطلوبة';
      return;
    }

    if (password !== confirm) {
      signupError.textContent = 'كلمة المرور غير متطابقة';
      return;
    }

    if (password.length < 6) {
      signupError.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
      return;
    }

    const result = await signUp(email, password, shopName);
    if (result.success) {
      signupSuccess.textContent = 'تم إنشاء الحساب بنجاح! جاري تحويلك...';
      signupError.textContent = '';
      setTimeout(() => {
        window.location.href = 'app.html';
      }, 1500);
    } else {
      signupError.textContent = result.error || 'فشل إنشاء الحساب';
      signupSuccess.textContent = '';
    }
  });
</script>

</body>
</html>
